<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishweshwara M | Prompt Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- Dark Neumorphism + Orange Theme --- */
        :root {
            --bg-color: #212327; 
            --shadow-dark: #181a1d;
            --shadow-light: #2a2c31;
            --accent-orange: #ff7b00;
            --text-main: #e2e8f0;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .neu-raised {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                       -10px -10px 20px var(--shadow-light);
        }

        .neu-pressed {
            background: var(--bg-color);
            border-radius: 12px;
            border: none;
            outline: none;
            padding: 1rem;
            color: var(--text-main);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            transition: all 0.3s ease;
            width: 100%;
        }

        .neu-pressed:focus {
            box-shadow: inset 8px 8px 16px var(--shadow-dark), 
                        inset -8px -8px 16px var(--shadow-light),
                        0 0 0 1px var(--accent-orange);
        }

        .neu-btn-primary {
            background: var(--bg-color);
            color: var(--accent-orange);
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .neu-btn-primary:hover {
            color: #ff9d42;
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                       -8px -8px 16px var(--shadow-light);
        }

        .neu-pill {
            background: var(--bg-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark), 
                       -3px -3px 6px var(--shadow-light);
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .neu-pill:hover {
            color: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        .lang-radio { display: none; }
        .lang-label {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: all 0.2s;
        }
        .lang-radio:checked + .lang-label {
            color: var(--accent-orange);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #3a3c42; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col">

    <header class="max-w-7xl mx-auto w-full mb-10 flex flex-col md:flex-row md:justify-between md:items-end border-b border-[#3a3c42] pb-6">
        <div>
            <h1 class="text-4xl font-bold tracking-tight text-white mb-1">
                Prompt<span style="color: var(--accent-orange)">Engine</span>
            </h1>
            <p class="text-sm text-[#8b949e] tracking-widest uppercase">Visual Design & Web Architecture</p>
        </div>
        <div class="mt-4 md:mt-0 text-right">
            <span class="text-xs text-[#8b949e] uppercase tracking-widest">Architect</span>
            <h2 class="text-xl font-semibold text-white">Vishweshwara M</h2>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-10 flex-1">
        
        <!-- LEFT: INPUT ENGINE -->
        <section class="lg:col-span-5 neu-raised p-8 flex flex-col gap-8 h-fit">
            
            <!-- Output Language -->
            <div>
                <label class="block text-xs font-bold text-[#8b949e] mb-3 uppercase tracking-wider">Output Language</label>
                <div class="flex gap-4">
                    <input type="radio" name="lang" id="lang-en" value="English" class="lang-radio" checked>
                    <label for="lang-en" class="lang-label">English</label>
                    <input type="radio" name="lang" id="lang-kn" value="Kannada (ಕನ್ನಡ)" class="lang-radio">
                    <label for="lang-kn" class="lang-label">ಕನ್ನಡ</label>
                    <input type="radio" name="lang" id="lang-sa" value="Sanskrit (संस्कृतम्)" class="lang-radio">
                    <label for="lang-sa" class="lang-label">संस्कृतम्</label>
                </div>
            </div>

            <!-- Role (Tailored to workflow) -->
            <div>
                <label class="block text-xs font-bold text-[#8b949e] mb-3 uppercase tracking-wider">1. System Role</label>
                <div class="flex flex-wrap gap-2 mb-3">
                    <button onclick="injectText('role', 'Senior Front-End Web Developer')" class="neu-pill">Web Developer</button>
                    <button onclick="injectText('role', 'Master Graphic Designer & Visual Artist')" class="neu-pill">Poster Designer</button>
                    <button onclick="injectText('role', 'UI/UX Expert Strategist')" class="neu-pill">UI/UX Strategist</button>
                </div>
                <input type="text" id="role" class="neu-pressed" placeholder="e.g., Act as a master graphic designer...">
            </div>

            <!-- Task (Tailored to workflow) -->
            <div>
                <label class="block text-xs font-bold text-[#8b949e] mb-3 uppercase tracking-wider">2. Core Objective</label>
                <div class="flex flex-wrap gap-2 mb-3">
                    <button onclick="injectText('task', 'Build a fully responsive website architecture using HTML and CSS.')" class="neu-pill">Build Website</button>
                    <button onclick="injectText('task', 'Generate a high-resolution, cinematic poster design.')" class="neu-pill">Create Poster</button>
                </div>
                <textarea id="task" rows="2" class="neu-pressed resize-none" placeholder="What exactly do you need built or designed?"></textarea>
            </div>

            <!-- Context (Tailored to workflow) -->
            <div>
                <label class="block text-xs font-bold text-[#8b949e] mb-3 uppercase tracking-wider">3. Constraints & Style Context</label>
                <div class="flex flex-wrap gap-2 mb-3">
                    <button onclick="injectText('context', 'Style: Dark Neumorphism. Use Tailwind CSS. Code must be clean and modular.')" class="neu-pill">Web: Clean Code & Tailwind</button>
                    <button onclick="injectText('context', 'Visuals: Photorealistic, dynamic studio lighting, bold typography space, highly detailed.')" class="neu-pill">Poster: Cinematic Lighting</button>
                </div>
                <textarea id="context" rows="3" class="neu-pressed resize-none" placeholder="Provide design rules, lighting instructions, or coding frameworks..."></textarea>
            </div>

            <button onclick="generatePrompts()" class="neu-btn-primary w-full mt-2">
                Synthesize Master Prompts
            </button>
        </section>

        <!-- RIGHT: OUTPUT CONSOLES -->
        <section class="lg:col-span-7 flex flex-col gap-8">
            
            <!-- ChatGPT (Best for Code) -->
            <div class="neu-raised p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-white text-sm tracking-wide">ChatGPT <span style="color: var(--accent-orange)">// Best for Web Code & Logic</span></h3>
                    <button onclick="copyCode('gpt-out', this)" class="text-xs text-[#8b949e] hover:text-white uppercase font-bold transition">Copy</button>
                </div>
                <textarea id="gpt-out" readonly class="neu-pressed flex-1 min-h-[140px] text-xs font-mono resize-none leading-relaxed text-[#a8b2bd]" placeholder="Engine standing by..."></textarea>
            </div>

            <!-- Claude (Best for UI/UX Copy & Structure) -->
            <div class="neu-raised p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-white text-sm tracking-wide">Claude <span style="color: var(--accent-orange)">// Best for UI/UX Layouts</span></h3>
                    <button onclick="copyCode('claude-out', this)" class="text-xs text-[#8b949e] hover:text-white uppercase font-bold transition">Copy</button>
                </div>
                <textarea id="claude-out" readonly class="neu-pressed flex-1 min-h-[140px] text-xs font-mono resize-none leading-relaxed text-[#a8b2bd]" placeholder="Engine standing by..."></textarea>
            </div>

            <!-- Gemini (Best for Visuals/Posters) -->
            <div class="neu-raised p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-white text-sm tracking-wide">Gemini <span style="color: var(--accent-orange)">// Best for Poster Generation</span></h3>
                    <button onclick="copyCode('gemini-out', this)" class="text-xs text-[#8b949e] hover:text-white uppercase font-bold transition">Copy</button>
                </div>
                <textarea id="gemini-out" readonly class="neu-pressed flex-1 min-h-[140px] text-xs font-mono resize-none leading-relaxed text-[#a8b2bd]" placeholder="Engine standing by..."></textarea>
            </div>

        </section>
    </main>

    <script>
        function injectText(id, text) {
            const el = document.getElementById(id);
            el.value = text;
        }

        function generatePrompts() {
            const role = document.getElementById('role').value.trim() || 'Expert Professional';
            const task = document.getElementById('task').value.trim();
            const context = document.getElementById('context').value.trim() || 'Ensure high quality output.';
            
            const langEls = document.getElementsByName('lang');
            let selectedLang = 'English';
            for (let i = 0; i < langEls.length; i++) {
                if (langEls[i].checked) { selectedLang = langEls[i].value; break; }
            }

            if (!task) { alert('Please enter a Core Objective.'); return; }

            const isImage = task.toLowerCase().includes('poster') || task.toLowerCase().includes('design') || task.toLowerCase().includes('image');
            const langRule = `CRITICAL RULE: Any textual output, UI copy, or typography suggestions must be in ${selectedLang}.`;

            const gpt = `## SYSTEM ROLE\nAct as a ${role}.\n\n## PRIMARY DIRECTIVE\n${task}\n\n## STYLE & CONSTRAINTS\n${context}\n\n## LINGUISTIC REQUIREMENT\n${langRule}\n\nPlease generate the exact requested artifact without unnecessary filler. Output any code in markdown blocks.`;

            const claude = `<system_role>\nYou are a ${role}.\n</system_role>\n\n<context>\n${context}\n</context>\n\n<task>\n${task}\n</task>\n\n<language_rules>\n${langRule}\n</language_rules>\n\n<instructions>\nThink through the architecture step-by-step in <scratchpad> tags. Provide the final optimized solution in <output> tags.\n</instructions>`;

            let gemini = `Role: ${role}.\n\nContext & Aesthetic Rules:\n${context}\n\nObjective:\n${task}\n\nLanguage Context: ${selectedLang}\n\n`;
            if(isImage) {
                gemini += `Execution: Please act as an advanced AI image generator prompt engineer. Break down the visual elements (lighting, camera angle, subject, background) and generate 3 distinct, highly detailed prompts that I can copy/paste into Midjourney or DALL-E to create this poster.`;
            } else {
                gemini += `Execution: Analyze this structurally and write the necessary code/architecture.`;
            }

            document.getElementById('gpt-out').value = gpt;
            document.getElementById('claude-out').value = claude;
            document.getElementById('gemini-out').value = gemini;
        }

        function copyCode(id, btn) {
            const text = document.getElementById(id).value;
            if (text && !text.includes('Engine standing by')) {
                navigator.clipboard.writeText(text);
                const originalText = btn.innerText;
                btn.innerText = "COPIED";
                btn.style.color = "var(--accent-orange)";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.color = "#8b949e";
                }, 2000);
            }
        }
    </script>
</body>
</html>
